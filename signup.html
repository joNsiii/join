<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="stylesheet" href="styles/signup.css">
    <link rel="stylesheet" href="media/signup-media.css">
    <link rel="stylesheet" href="styles/templates.css">
    <link rel="stylesheet" href="./fonts/fonts.css">
</head>

<body onload="loadUsers()" class="signup-body">
    <div class="signup-content">
        <div class="front-page-container">
            <img src="./img/Capa 2.png" alt="join-logo" class="joinLogo">
            <div class="signup-main">
                <div class="signup-container">
                    <div class="signup-text-child">
                        <a class="arrow-back-to-login" href="login.html"><img src="img/arrow-left-line.png" alt=""></a>
                        <p>Sign up</p>
                        <div class="border"></div>
                    </div>
                </div>

                <form onsubmit="checkPassword(); return false" class="input-container">
                    <div class="input-child"><input id="username" type="name" required placeholder="Name">
                        <img src="./img/person.png" alt="Name-icon" id="name-signup">
                    </div>
                    <div class="input-child"><input id="useremail" type="email" required placeholder="Email">
                        <img src="./img/mail.png" alt="email-icon" id="email-signup">
                    </div>
                    <div class="input-child" id="password-parent"><input  type="password" required placeholder="Password" id="password-type">
                        <div class="password-inp">
                            <img src="./img/lock.png" alt="password-icon" id="set-password" onclick="togglePasswordIcon()">
                        </div>
                    </div>
                    <div class="input-child"><input type="password" required placeholder="Confirm Password" id="password-type2">
                        <div class="password-inp">
                            <img src="./img/lock.png" alt="password-icon" id="confirm-password" onclick="togglePasswordIcon()">
                        </div>
                    </div>

                    <div class="checkbox-button-container">
                        <div class="policy">
                            <input type="checkbox" class="policy-checkbox" name="policy" required id="policy-checkbox">
                            <p>I accept the </p><a href="./privacy_policy.html">Privacy Policy</a>
                        </div>

                        <div class="button-signup-container">
                            <button class="button button-signup">Sign up </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="footer-container">
                <div class="footer-parent">
                    <p>Privacy Policy</p>
                    <p>Legal Notice</p>
                </div>
            </div>
        </div>
    </div>
    <script src="javascript/storage.js"></script>
    <script src="javascript/register.js"></script>
    <script src="./javascript/global.js"></script>
</body>

</html>
