<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <script src="javascript/storage.js"></script>
    <script src="javascript/includes.js"></script>
    <link rel="stylesheet" href="styles/templates.css">
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="styles/add-task.css">
    <link rel="stylesheet" href="./media/add-task-media.css">
</head>

<body onload="init()">
    <div w3-include-html="templates/templates.html"></div>
    <div class="add-task-content">
        <div class="add-task-headline">Add Task</div>
        <form>
            <div class="display-flex" id="taskForm">
                <div class="left-side-inputs">
                    <div class="single-input-container">
                        <label>Title<label class="red-star">*</label></label>
                        <input class="input-single-line"  placeholder="Enter a title" type="text" id="title-task">
                    </div>
                    <div class="desc-input-container">
                        <label>Description</label>
                        <textarea class="desc-textarea" placeholder="Enter a Description" id="description-task" cols="30"
                            rows="3"></textarea>
                    </div>
                    <div class="single-input-container">
                        <label>Assigned to</label>
                        <select class="select-input" id="assign-task">
                            <option value="" disabled selected>Select contacts to assign</option>
                            <option value="">Rudolf Sachslehner</option>
                            <option value="">Oumout Resit Ismail</option>
                            <option value="">Jens Gartsch</option>
                            <option value="">Janik Stratmann</option>
                        </select>
                    </div>
                </div>
                <div class="border-between"></div>
                <div class="right-side-inputs">
                    <div class="single-input-container">
                        <label for="date">Due Date<label class="red-star">*</label></label>
                        <input class="input-single-line" placeholder="dd/mm/yyyy" onfocus="(this.type='date')"
                            onblur="(this.type='text')" name="date" id="date date-task">
                    </div>
                    <div class="prio-container">
                        <label>Prio</label>
                        <div class="prio-select-con">
                            <div class="prio-selection">
                                <p>Urgent</p><img src="./img/urgent-red-arrows.png" alt="urgent-red">
                            </div>
                            <div class="medium-selection">
                                <p>Medium</p> <img src="./img/medium.png" alt="medium">
                            </div>
                            <div class="prio-selection">
                                <p>Low</p><img src="./img/low.png" alt="low">
                            </div>
                        </div>
                    </div>
                    <div class="single-input-container">
                        <label>Category<label class="red-star">*</label></label>
                        <select class="select-input" id="category">
                            <option value="" disabled selected>Select contacts to assign</option>
                            <option value="">Technical Task</option>
                            <option value="">User Story</option>
                        </select>
                    </div>
                    <div class="single-input-container">
                        <label>Subtasks</label>
                        <input class="input-single-line"  placeholder="Add a new subtask" type="text">
                    </div>
                </div>

            </div>
            <div class="bottom-button-container">
                <span class="bottom-flex-left"><label class="red-star">*</label>This field is required</span>
                <div class="bottom-flex-right">
                    <button class="button button-clear">Clear</button>
                    <button class="button button-task" onclick="scopeTasks()">Create Task </button>
                </div>
                <div id="taskList"></div>
            </div>
        </form>
    </div>

    <script src="./javascript/add-task.js"></script>
</body>

</html>
