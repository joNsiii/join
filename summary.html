<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <script src="./templates/includes.js"></script>
    <script src="./script.js"></script>
    <script src="./storage.js"></script>
    <link rel="stylesheet" href="./templates/templates.css">
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./summary.css">
    <link rel="stylesheet" href="./summary-media.css">
</head>

<body onload="init()">
    <div w3-include-html="templates/side-head.html"></div>
    <div class="summary-content">
        <div class="flex-column">
            <div class="summary-headline">
                <div class="summary-headline-left">Join 360</div>
                <div class="summary-headline-mid"></div>
                <div class="summary-headline-right">Key Metrics at a Glance</div>
            </div>
            <div class="summary-main-content">
                <div class="summary-main-overview">
                    <div class="summary-main-overview-container">
                        <div class="summary-main-img-container">
                            <img id="edit-img" src="./img/edit-bg-blue.png" alt="edit">
                        </div>
                        <div class="summary-main-counter-container">
                            <span class="summary-main-counter">1</span>
                            <span>To-do</span>
                        </div>
                    </div>
                    <div class="summary-main-overview-container">
                        <div class="summary-main-overview-right-success-img">
                            <img id="success-img" src="./img/success-bg-blue.png" alt="done">
                        </div>
                        <div class="summary-main-counter-container">
                            <span class="summary-main-counter">1</span>
                            <span>Done</span>
                        </div>
                    </div>
                </div>
                <div class="summary-urgent">
                    <div class="summary-urgent-left">
                        <div class="summary-main-img-container-urgent">
                            <img src="./img/urgent-red.png" alt="urgent">
                        </div>
                        <div class="summary-main-counter-container">
                            <span class="summary-main-counter">1</span>
                            <span>Urgent</span>
                        </div>
                    </div>
                    <div class="summary-urgent-border"></div>
                    <div class="summary-urgent-right">
                        <span class="summary-urgent-right-date">October 16, 2022</span>
                        <span class="summary-urgent-right-text">Upcoming Deadline</span>
                    </div>
                </div>
                <div class="summary-main-tasks">
                    <div class="summary-main-counter-container-task">
                        <span class="summary-main-counter">5</span>
                        <span class="summary-main-name">Tasks in Board</span>
                    </div>
                    <div class="summary-main-counter-container-task">
                        <span class="summary-main-counter">2</span>
                        <span class="summary-main-name">Tasks in Progress</span>
                    </div>
                    <div class="summary-main-counter-container-task">
                        <span class="summary-main-counter">2</span>
                        <span class="summary-main-name">Awaiting Feedback</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="summary-greeting-container">
            <span class="summary-daytime-container">Good morning,</span>
            <span class="summary-name-container">Sofia Müller</span>
        </div>
    </div>
</body>

</html>
